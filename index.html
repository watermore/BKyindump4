<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频展示</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #000; margin: 0; color: #fff; font-family: sans-serif;
        }
        h2 { margin-bottom: 20px; font-weight: 300; }
        video { 
            max-width: 90%; 
            height: 80vh; /* 针对竖屏优化，高度占屏幕80% */
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1); 
        }
    </style>
</head>
<body>
    <h2>实例演示</h2>
    <video controls autoplay muted playsinline>
        <source src="shilishipin.mp4" type="video/mp4">
        您的浏览器不支持播放该视频。
    </video>
</body>
</html>
